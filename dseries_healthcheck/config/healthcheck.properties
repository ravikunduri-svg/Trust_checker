# ESP dSeries Workload Automation Health Check Configuration
# Version: 1.0.0
# Date: 2026-02-11

# ============================================================================
# DATABASE CONFIGURATION
# ============================================================================

# Database connection settings
db.host=localhost
db.port=5432
db.name=WADB
db.user=wauser

# Database type: postgresql, oracle, mssql
db.type=postgresql

# Database password (NOT recommended - use password file or environment variable instead)
# db.password=

# Database password file (recommended for security)
# Windows: C:\\CA\\WA_DE\\.dbpass
# Linux:   /opt/CA/WA_DE/.dbpass
db.password.file=

# Database connection timeout (seconds)
db.connection.timeout=30

# ============================================================================
# SERVER CONFIGURATION
# ============================================================================

# dSeries server settings
server.host=localhost
server.port=7507
server.admin.user=admin

# Installation directory
# Windows: C:\\CA\\WA_DE
# Linux:   /opt/CA/WA_DE
install.dir=/opt/CA/WA_DE

# ============================================================================
# THRESHOLD CONFIGURATION
# ============================================================================

# CPU thresholds (percentage)
threshold.cpu.warning=70
threshold.cpu.critical=85

# Memory thresholds (percentage)
threshold.memory.warning=80
threshold.memory.critical=90

# Disk space thresholds (percentage)
threshold.disk.warning=75
threshold.disk.critical=85

# Swap usage thresholds (percentage)
threshold.swap.warning=10
threshold.swap.critical=50

# ============================================================================
# JVM CONFIGURATION THRESHOLDS
# ============================================================================

# JVM heap size thresholds (megabytes)
# CRITICAL: dSeries requires minimum 4GB for production
threshold.jvm.heap.min.mb=4096
threshold.jvm.heap.recommended.mb=4096
threshold.jvm.heap.max.mb=8192

# GC thresholds
threshold.jvm.gc.frequency.per.minute=10
threshold.jvm.gc.pause.ms=500

# ============================================================================
# DATABASE PERFORMANCE THRESHOLDS
# ============================================================================

# Database connection pool
threshold.db.min.available.connections=5

# Query performance (milliseconds)
threshold.db.max.query.time.ms=500

# Backup age (hours)
threshold.db.max.backup.age.hours=24

# Index fragmentation (percentage)
threshold.db.max.index.fragmentation.percent=30

# ============================================================================
# WORKLOAD CONFIGURATION
# ============================================================================

# Workload size: small, medium, large
# small:  0-15,000 daily jobs
# medium: 15,001-75,000 daily jobs
# large:  75,001-150,000 daily jobs
workload.size=medium

# Average daily job count
workload.daily.jobs=50000

# ============================================================================
# WORKLOAD PERFORMANCE THRESHOLDS
# ============================================================================

# Queue depth
threshold.workload.max.queue.depth=1000

# Job duration (minutes)
threshold.workload.max.job.duration.minutes=240

# Failed jobs (percentage)
threshold.workload.max.failed.jobs.percent=5

# Success rate (percentage)
threshold.workload.min.success.rate.percent=95

# ============================================================================
# AGENT HEALTH THRESHOLDS
# ============================================================================

# Communication lag (seconds)
threshold.agent.max.communication.lag.seconds=5

# Failed ping rate (percentage)
threshold.agent.max.failed.ping.percent=5

# Agent resource usage
threshold.agent.cpu.warning=80
threshold.agent.memory.warning=85
threshold.agent.disk.critical=90

# ============================================================================
# REPORTING CONFIGURATION
# ============================================================================

# Report output directory
# Windows: C:\\CA\\WA_DE\\logs\\healthcheck
# Linux:   /var/log/dseries/healthcheck
report.output.dir=/var/log/dseries/healthcheck

# Report retention (days)
report.retention.days=90

# Report formats (comma-separated): html, json, pdf, excel
report.formats=html,json

# Include recommendations in reports
report.include.recommendations=true

# Include historical trends
report.include.historical.trends=false

# ============================================================================
# ALERTING CONFIGURATION
# ============================================================================

# Enable alerting
alerting.enabled=false

# Email alerting
alerting.email.enabled=false
alerting.email.smtp.host=smtp.company.com
alerting.email.smtp.port=587
alerting.email.smtp.user=healthcheck@company.com
alerting.email.smtp.use.tls=true
alerting.email.from.address=dseries-healthcheck@company.com
alerting.email.recipients=admin@company.com,ops@company.com
alerting.email.send.on.critical.only=false

# ============================================================================
# ADVANCED CONFIGURATION
# ============================================================================

# Enable parallel checks
advanced.parallel.checks=true

# Maximum worker threads for parallel execution
advanced.max.workers=5

# Check timeout (seconds)
advanced.check.timeout.seconds=300

# Retry failed checks
advanced.retry.failed.checks=true

# Maximum retries
advanced.max.retries=3

# Log level: SEVERE, WARNING, INFO, CONFIG, FINE, FINER, FINEST
advanced.log.level=INFO

# ============================================================================
# THREAD POOL RECOMMENDATIONS (Based on Control-M Best Practices)
# ============================================================================

# Small environment (0-15,000 daily jobs)
threadpool.small.download=3
threadpool.small.db.update=2
threadpool.small.selector=4
threadpool.small.post.process=4
threadpool.small.tracker.workers=4

# Medium environment (15,001-75,000 daily jobs)
threadpool.medium.download=6
threadpool.medium.db.update=4
threadpool.medium.selector=8
threadpool.medium.post.process=8
threadpool.medium.tracker.workers=8

# Large environment (75,001-150,000 daily jobs)
threadpool.large.download=8
threadpool.large.db.update=8
threadpool.large.selector=12
threadpool.large.post.process=12
threadpool.large.tracker.workers=12

# ============================================================================
# END OF CONFIGURATION
# ============================================================================
